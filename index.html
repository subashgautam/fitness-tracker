<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitTrack Pro - 5 Day Split</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
  <script src="app.js" defer></script>
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <h1>🏋️ FitTrack Pro</h1>
      <p class="subtitle">5-Day Split • Auto-Log • Weekly Progress</p>
    </div>
    <div class="header-controls">
      <button id="btn-reset-week" class="btn btn-secondary" title="Start new tracking week">🔄 New Week</button>
      <button id="btn-theme" class="btn btn-secondary">☀️ Light Mode</button>
    </div>
  </header>

  <main id="app-container">
    <!-- Days Grid -->
    <section id="days-section">
      <div id="days-grid" class="grid-container"></div>
    </section>

    <!-- Weekly Report & Analytics -->
    <section id="report-section" class="section-card">
      <h2>📊 Weekly Progress Report</h2>
      <div class="report-grid">
        <div class="report-card">
          <h3>📅 This Week</h3>
          <div id="weekly-summary" class="summary-list"></div>
        </div>
        <div class="report-card">
          <h3>📈 Volume Trend</h3>
          <div class="chart-wrapper">
            <canvas id="volumeChart"></canvas>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Configure Day Modal -->
  <dialog id="config-modal">
    <form id="config-form">
      <h3 id="config-title">Configure Exercises</h3>
      <p class="hint">Select exercises to include in this day's schedule.</p>
      <div id="config-list" class="checkbox-list"></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-secondary" id="btn-cancel-config">Cancel</button>
        <button type="submit" class="btn btn-accent">Save Schedule</button>
      </div>
    </form>
  </dialog>

  <script>
    // Inline theme init to prevent flash
    const savedTheme = localStorage.getItem('fittrack_pro_v1_theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
  </script>
</body>
</html>
